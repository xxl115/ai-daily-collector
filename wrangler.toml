# Cloudflare Workers Python 配置
name = "ai-daily-collector"
main = "worker.py"
compatibility_date = "2024-01-15"
compatibility_flags = ["python_workers"]

# Python Workers 运行时设置
[build]
command = ""

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "ai-daily-collector"
database_id = "62f5766f-e837-402c-9237-390d4dbbdb52"

# 环境变量
[vars]
ENVIRONMENT = "production"
LOG_LEVEL = "INFO"
LOG_FORMAT = "json"
DATABASE_PROVIDER = "d1"

# Secrets (部署时设置)
# wrangler secret put CF_API_TOKEN
# wrangler secret put D7CCJtlrneIx9TW2J98Xc8FE17beUQ7tKbFTVkTi
