openapi: 3.0.3
info:
  title: AI Daily Collector API
  description: AI 资讯自动采集系统的 REST API
  version: 2.0.0
  contact:
    name: AI Daily Collector
    url: https://github.com/xxl115/ai-daily-collector

servers:
  - url: http://localhost:8000
    description: 本地开发环境
  - url: https://ai-daily-collector.xxl185.workers.dev
    description: 生产环境 (Cloudflare Workers)

tags:
  - name: health
    description: 健康检查
  - name: articles
    description: 文章管理
  - name: stats
    description: 统计信息
  - name: sources
    description: 来源管理
  - name: crawl
    description: 抓取管理

paths:
  /health:
    get:
      tags:
        - health
      summary: 健康检查
      operationId: healthCheck
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/v2/articles:
    get:
      tags:
        - articles
      summary: 获取文章列表
      description: 分页获取文章列表
      operationId: listArticles
      parameters:
        - name: limit
          in: query
          description: 数量限制
          required: false
          schema:
            type: integer
            default: 20
        - name: source
          in: query
          description: 按来源筛选
          required: false
          schema:
            type: string
        - name: category
          in: query
          description: 按分类筛选
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 成功返回文章列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Article'
                  total:
                    type: integer

  /api/v2/articles/{article_id}:
    get:
      tags:
        - articles
      summary: 获取单篇文章
      description: 根据文章 ID 获取详细信息
      operationId: getArticle
      parameters:
        - name: article_id
          in: path
          description: 文章 ID
          required: true
          schema:
            type: string
            example: "abc123"
      responses:
        '200':
          description: 成功返回文章详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleDetail'
        '404':
          description: 文章不存在

  /api/v2/stats:
    get:
      tags:
        - stats
      summary: 获取统计信息
      operationId: getStats
      responses:
        '200':
          description: 成功返回统计信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'

  /api/v2/sources:
    get:
      tags:
        - sources
      summary: 获取来源列表
      operationId: listSources
      responses:
        '200':
          description: 成功返回来源列表
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/v2/crawl-logs:
    get:
      tags:
        - crawl
      summary: 获取抓取日志
      operationId: getCrawlLogs
      responses:
        '200':
          description: 成功返回抓取日志

  /api/v2/crawl-stats:
    get:
      tags:
        - crawl
      summary: 获取抓取统计
      operationId: getCrawlStats
      responses:
        '200':
          description: 成功返回抓取统计

components:
  schemas:
    Article:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        url:
          type: string
        source:
          type: string
        summary:
          type: string
        categories:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string

    ArticleDetail:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        url:
          type: string
        content:
          type: string
        source:
          type: string
        summary:
          type: string
        categories:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string

    StatsResponse:
      type: object
      properties:
        total_articles:
          type: integer
        sources:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              count:
                type: integer
        last_updated:
          type: string
