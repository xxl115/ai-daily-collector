name: Daily Report Generation

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      articles_dir:
        type: string
        description: 'Directory with processed articles'
        required: false
        default: 'ai/articles/processed'
      output_file:
        type: string
        description: 'Output report file'
        required: false
        default: 'ai/daily/REPORT.md'

env:
  PYTHON_VERSION: "3.12"
  ARTICLES_DIR: "ai/articles/processed"
  OUTPUT_FILE: "ai/daily/REPORT.md"

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 jieba pyyaml

      - name: Generate report
        run: |
          python -c "
from scripts.report_generator import ReportGenerator
import glob
import json
import os

articles_dir = os.environ.get('ARTICLES_DIR', 'ai/articles/processed')
output_file = os.environ.get('OUTPUT_FILE', 'ai/daily/REPORT.md')

articles = []
for f in glob.glob(articles_dir + '/*.json'):
    try:
        with open(f) as fp:
            articles.append(json.load(fp))
    except:
        pass

rg = ReportGenerator()
rg.generate(articles, output_file)
print(f'Generated report with {len(articles)} articles')
"

      - name: Commit results
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ai/daily/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Daily Report: $(date +%Y-%m-%d)" || true
            git push
          else
            echo "No changes to commit."
          fi
