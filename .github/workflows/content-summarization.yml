name: Content Summarization

on:
  workflow_dispatch:
    inputs:
      input_dir:
        type: string
        description: 'Input directory with extracted articles'
        required: false
        default: 'ai/articles/processed'
      api_provider:
        type: choice
        description: 'LLM API provider'
        required: false
        default: 'zhipu'
        options:
          - zhipu
          - ollama
          - groq

env:
  PYTHON_VERSION: "3.12"

jobs:
  summarization:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-summarize-v1-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 jieba pyyaml
          pip install zhipuai

      - name: Run summarization
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          python scripts/content_processor.py \
            --input ${{ inputs.input_dir || 'ai/articles/processed' }} \
            --output ai/articles/summarized \
            --mode summarize-only \
            --api-provider ${{ inputs.api_provider || 'zhipu' }}

      - name: Commit results
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ai/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Content Summarization: $(date +%Y-%m-%d)" || true
            git push
          else
            echo "No changes to commit."
          fi
