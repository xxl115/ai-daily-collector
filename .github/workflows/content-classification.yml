name: Content Classification

on:
  workflow_dispatch:
    inputs:
      input_dir:
        type: string
        description: 'Input directory with articles to classify'
        required: false
        default: 'ai/articles/processed'

env:
  PYTHON_VERSION: "3.12"

jobs:
  classification:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-classify-v1-${{ hashFiles('pyproject.toml') }}

      - name: Cache BGE model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-bge-m3-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 jieba pyyaml
          pip install sentence-transformers numpy

      - name: Run classification
        run: |
          python scripts/content_processor.py \
            --input ${{ inputs.input_dir || 'ai/articles/processed' }} \
            --output ai/articles/classified \
            --mode classify-only

      - name: Commit results
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ai/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Content Classification: $(date +%Y-%m-%d)" || true
            git push
          else
            echo "No changes to commit."
          fi
