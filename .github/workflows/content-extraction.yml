name: Content Extraction

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      max_articles:
        type: number
        description: 'Maximum articles to process'
        required: false
        default: 30

env:
  PYTHON_VERSION: "3.12"

jobs:
  extraction:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-extract-v1-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install trafilatura requests beautifulsoup4 jieba pyyaml
          pip install crawl4ai
          pip install cloudflare

      - name: Run extraction from D1
        run: |
          python scripts/content_processor.py \
            --source d1 \
            --mode extract-only \
            --max-articles ${{ inputs.max_articles || 30 }} \
            --d1-account-id ${{ secrets.CF_ACCOUNT_ID }} \
            --d1-database-id ${{ secrets.CF_D1_DATABASE_ID }} \
            --d1-api-token ${{ secrets.CF_API_TOKEN }}

      - name: Commit results
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ai/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Content Extraction: $(date +%Y-%m-%d)" || true
            git push
          else
            echo "No changes to commit."
          fi
