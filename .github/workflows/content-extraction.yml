name: Content Extraction

on:
  schedule:
    # 每半小时执行一次
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      max_articles:
        type: number
        description: 'Maximum articles to process'
        required: false
        default: 100

env:
  PYTHON_VERSION: "3.12"

jobs:
  extraction:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-extract-v1-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install trafilatura requests beautifulsoup4 jieba pyyaml
          pip install crawl4ai
          pip install cloudflare
          pip install playwright
          playwright install chromium --with-deps

      - name: Run extraction from D1
        timeout-minutes: 45
        env:
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          JINA_PROXY_URL: ${{ secrets.JINA_PROXY_URL }}
          USE_JINA_RACE: 'true'
        run: |
          python scripts/content_processor.py \
            --source d1 \
            --mode extract-only \
            --max-articles ${{ inputs.max_articles || 30 }} \
            --use-crawl4ai-batch \
            --d1-account-id ${{ secrets.CF_ACCOUNT_ID }} \
            --d1-database-id ${{ secrets.CF_D1_DATABASE_ID }} \
            --d1-api-token ${{ secrets.CF_API_TOKEN }}
