name: AI Daily Collection (Scheduled)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: '触发原因'
        required: false
        default: 'Manual trigger'

env:
  PYTHON_VERSION: '3.12'

permissions:
  contents: write
  actions: read

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    name: Collect & Deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[local]"
          pip install jq

      - name: Run AI Daily Collection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          DATABASE_PROVIDER: d1
        run: |
          echo "============================================"
          echo "AI Daily Collector - Scheduled Collection"
          echo "Date: $(date +%Y-%m-%d)"
          echo "============================================"
          echo ""
          python -m ingestor.main --config config/sources.yaml
          echo ""
          echo "✅ Collection complete!"

      - name: Show results
        run: |
          echo "📊 采集结果预览:"
          echo ""
          if [ -d "ai/articles/original" ]; then
            ARTICLE_COUNT=$(find ai/articles/original -name "*.md" 2>/dev/null | wc -l)
            echo "✅ 文章文件: ${ARTICLE_COUNT} 个"
            echo "   目录: ai/articles/original/"
          else
            echo "⚠️ 文章目录未创建"
          fi
          echo ""

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-articles
          path: ai/articles/original/

      - name: Commit results
        run: |
          cd ${{ github.workspace }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 提交文章文件
          if [ -d "ai/articles/original" ]; then
            git add ai/articles/original/ 2>/dev/null || true
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "AI Daily: $(date +%Y-%m-%d)" || echo "Commit failed"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:master || echo "Push failed"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Update wrangler.toml with D1 database ID
        env:
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
        run: |
          if [ -n "$CF_D1_DATABASE_ID" ]; then
            sed -i "s/your-database-id-here/$CF_D1_DATABASE_ID/g" wrangler.toml
            echo "Updated wrangler.toml with D1 database ID"
          else
            echo "CF_D1_DATABASE_ID not set"
            exit 1
          fi

      - name: Extract Worker Name
        id: worker-name
        run: |
          WORKER_NAME=$(grep "^name = " wrangler.toml | sed 's/name = "\(.*\)"/\1/' | tr -d '"')
          echo "name=$WORKER_NAME" >> $GITHUB_OUTPUT
          echo "📦 Worker 名称: $WORKER_NAME"

      - name: Deploy to Cloudflare Workers
        run: |
          echo "🚀 部署到 Cloudflare Workers..."
          wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Verify Deployment
        run: |
          WORKER_NAME="${{ steps.worker-name.outputs.name }}"
          echo ""
          echo "================================================"
          echo "✅ 采集与部署完成!"
          echo ""
          echo "📝 访问地址:"
          echo "   - Worker: https://${WORKER_NAME}.workers.dev"
          echo "   - API: https://${WORKER_NAME}.workers.dev/api/hotspots"
          echo "   - Frontend: https://ai-daily-collector.pages.dev"
          echo "================================================"

      - name: Workflow Summary
        if: always()
        run: |
          WORKER_NAME="${{ steps.worker-name.outputs.name }}"
          ARTICLE_COUNT=$(find ai/articles/original -name "*.md" 2>/dev/null | wc -l || echo "0")

          echo "## 📊 AI Daily 数据采集" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **触发时间**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **触发方式**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **采集文章**: ${ARTICLE_COUNT} 篇" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker**: https://${WORKER_NAME}.workers.dev" >> $GITHUB_STEP_SUMMARY
          echo "- **前端**: https://ai-daily-collector.pages.dev" >> $GITHUB_STEP_SUMMARY
